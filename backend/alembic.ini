# Alembic configuration file for Costa Rica Real Estate backend.
# The actual database URL is injected from Flask config in migrations/env.py
# so the placeholder below is never used directly.

[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os

# Placeholder – overridden at runtime by migrations/env.py
sqlalchemy.url = postgresql://user:pass@localhost/dbname

[post_write_hooks]
# Uncomment to auto-format generated migration files:
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 88

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = [sys.stderr]
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
