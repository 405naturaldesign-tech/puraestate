# =============================================================================
# PuraEstate – Flower Celery Monitoring (Internal / Admin Only)
# =============================================================================
# Flower is served at https://puraestate.com/flower/ but only accessible
# after HTTP Basic Auth. For extra security, restrict by IP in production.
# =============================================================================

# NOTE: This file is only active when the flower service is running.
# The flower upstream is defined here locally.

upstream flower_upstream {
    server flower:5555;
    keepalive 4;
}

# Flower is proxied behind the main server under /flower/
# Add this location block inside the main server if you want flower
# accessible via the main domain. Alternatively, keep it on a separate
# internal port (5555) with firewall rules.
#
# The docker-compose exposes flower on port 5556 (internal only).
# Access via SSH tunnel: ssh -L 5556:localhost:5556 user@puraestate.com
