# =============================================================================
# PuraEstate – Virtual Host Configuration
# puraestate.com + www.puraestate.com
# =============================================================================

# ---------------------------------------------------------------------------
# Shared security headers map
# ---------------------------------------------------------------------------
map $sent_http_content_type $csp_header {
    default "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://maps.googleapis.com https://api.mapbox.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https://puraestate.com wss://puraestate.com https://api.stripe.com; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;";
}

# ---------------------------------------------------------------------------
# HTTP → HTTPS redirect + ACME challenge
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name puraestate.com www.puraestate.com;

    # Let's Encrypt ACME challenge location
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # Internal nginx health check (used by Docker health check)
    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# www → apex redirect (HTTPS)
# ---------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.puraestate.com;

    ssl_certificate     /etc/letsencrypt/live/puraestate.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/puraestate.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/puraestate.com/chain.pem;

    # DH params (generated by init-ssl.sh)
    ssl_dhparam /etc/nginx/ssl/dhparam.pem;

    return 301 https://puraestate.com$request_uri;
}

# ---------------------------------------------------------------------------
# Main HTTPS server block
# ---------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name puraestate.com;

    # SSL Certificate (issued by Certbot / Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/puraestate.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/puraestate.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/puraestate.com/chain.pem;

    # DH parameters for extra forward secrecy (2048-bit minimum)
    ssl_dhparam /etc/nginx/ssl/dhparam.pem;

    # ---------------------------------------------------------------------------
    # Security headers
    # ---------------------------------------------------------------------------
    add_header Strict-Transport-Security    "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options              "DENY" always;
    add_header X-Content-Type-Options       "nosniff" always;
    add_header X-XSS-Protection            "1; mode=block" always;
    add_header Referrer-Policy             "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy          "camera=(), microphone=(), geolocation=(self), payment=(self)" always;
    add_header Content-Security-Policy     $csp_header always;
    add_header X-Request-ID                $request_id always;

    # ---------------------------------------------------------------------------
    # Logging
    # ---------------------------------------------------------------------------
    access_log /var/log/nginx/puraestate-access.log json;
    error_log  /var/log/nginx/puraestate-error.log warn;

    # ---------------------------------------------------------------------------
    # Rate limiting (global)
    # ---------------------------------------------------------------------------
    limit_req zone=global burst=60 nodelay;

    # ---------------------------------------------------------------------------
    # Let's Encrypt renewal
    # ---------------------------------------------------------------------------
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # ---------------------------------------------------------------------------
    # Internal nginx health check
    # ---------------------------------------------------------------------------
    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ---------------------------------------------------------------------------
    # Static file caching for Next.js /_next/static
    # ---------------------------------------------------------------------------
    location /_next/static/ {
        proxy_pass          http://nextjs_frontend;
        proxy_cache_valid   200 365d;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;

        expires     1y;
        add_header  Cache-Control "public, immutable";
        add_header  X-Cache-Status $upstream_cache_status;

        proxy_http_version  1.1;
        proxy_set_header    Connection "";
    }

    # Static assets (images, fonts, etc.)
    location /static/ {
        proxy_pass http://nextjs_frontend;
        expires    30d;
        add_header Cache-Control "public";
    }

    # ---------------------------------------------------------------------------
    # Flask API – /api/*
    # ---------------------------------------------------------------------------
    location /api/ {
        # API-specific rate limiting
        limit_req zone=api burst=20 nodelay;

        # Proxy to Flask backend
        proxy_pass          http://flask_api;
        proxy_http_version  1.1;
        proxy_set_header    Connection "";

        # Pass real client info
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_set_header    X-Forwarded-Host  $host;
        proxy_set_header    X-Request-ID      $request_id;

        # Timeouts
        proxy_connect_timeout   10s;
        proxy_send_timeout      120s;
        proxy_read_timeout      120s;

        # Buffer settings
        proxy_buffering         on;
        proxy_buffer_size       16k;
        proxy_buffers           4 32k;
        proxy_busy_buffers_size 64k;

        # CORS headers (Flask also sets these; nginx adds as fallback)
        add_header Access-Control-Allow-Origin  "$http_origin" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Max-Age "600" always;

        # Handle OPTIONS preflight
        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ---------------------------------------------------------------------------
    # Auth endpoints – extra strict rate limiting
    # ---------------------------------------------------------------------------
    location /api/v1/auth/ {
        limit_req zone=auth burst=10 nodelay;

        proxy_pass          http://flask_api;
        proxy_http_version  1.1;
        proxy_set_header    Connection "";
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_set_header    X-Request-ID      $request_id;

        proxy_connect_timeout   10s;
        proxy_send_timeout      30s;
        proxy_read_timeout      30s;
    }

    # ---------------------------------------------------------------------------
    # Flask health check (direct access)
    # ---------------------------------------------------------------------------
    location /health {
        proxy_pass          http://flask_api;
        proxy_http_version  1.1;
        proxy_set_header    Connection "";
        access_log          off;

        proxy_connect_timeout   5s;
        proxy_read_timeout      10s;
    }

    # ---------------------------------------------------------------------------
    # WebSocket support (Socket.IO)
    # ---------------------------------------------------------------------------
    location /socket.io/ {
        proxy_pass          http://flask_api;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host       $host;
        proxy_set_header    X-Real-IP  $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;

        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # ---------------------------------------------------------------------------
    # Next.js frontend – all other requests
    # ---------------------------------------------------------------------------
    location / {
        proxy_pass          http://nextjs_frontend;
        proxy_http_version  1.1;
        proxy_set_header    Connection "";

        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_set_header    X-Request-ID      $request_id;

        # Next.js HMR WebSocket (production: not needed, but safe to include)
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection $http_connection;

        proxy_connect_timeout   10s;
        proxy_send_timeout      60s;
        proxy_read_timeout      60s;

        proxy_buffering         on;
        proxy_buffer_size       8k;
        proxy_buffers           4 16k;
    }

    # ---------------------------------------------------------------------------
    # Deny access to hidden files and sensitive paths
    # ---------------------------------------------------------------------------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ \.(env|git|gitignore|bak|swp|sql)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}
