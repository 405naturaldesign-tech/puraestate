# =============================================================================
# PuraEstate – Nginx Main Configuration
# =============================================================================

user  nginx;

# Auto-detect CPU cores for optimal performance
worker_processes  auto;

# Increase open file descriptor limit per worker
worker_rlimit_nofile 65535;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    # Maximum simultaneous connections per worker
    worker_connections  4096;
    # Efficient connection acceptance
    multi_accept on;
    use epoll;
}

http {
    # ---------------------------------------------------------------------------
    # Basic settings
    # ---------------------------------------------------------------------------
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Hide nginx version from response headers
    server_tokens off;

    # Efficient file sending
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;

    # Connection timeout settings
    keepalive_timeout           75s;
    keepalive_requests          1000;
    client_header_timeout       30s;
    client_body_timeout         60s;
    send_timeout                60s;
    reset_timedout_connection   on;

    # Request body limits (match Flask MAX_CONTENT_LENGTH = 16MB)
    client_max_body_size        20m;
    client_body_buffer_size     128k;
    client_header_buffer_size   4k;
    large_client_header_buffers 4 16k;

    # ---------------------------------------------------------------------------
    # Logging
    # ---------------------------------------------------------------------------
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      'rt=$request_time uct="$upstream_connect_time" '
                      'uht="$upstream_header_time" urt="$upstream_response_time"';

    log_format  json  escape=json
                      '{"time":"$time_iso8601",'
                      '"remote_addr":"$remote_addr",'
                      '"method":"$request_method",'
                      '"uri":"$request_uri",'
                      '"status":$status,'
                      '"bytes":$body_bytes_sent,'
                      '"duration":$request_time,'
                      '"upstream_time":"$upstream_response_time",'
                      '"referer":"$http_referer",'
                      '"user_agent":"$http_user_agent",'
                      '"x_forwarded_for":"$http_x_forwarded_for",'
                      '"request_id":"$http_x_request_id"}';

    access_log  /var/log/nginx/access.log  json;

    # ---------------------------------------------------------------------------
    # Gzip compression
    # ---------------------------------------------------------------------------
    gzip                on;
    gzip_vary           on;
    gzip_proxied        any;
    gzip_comp_level     6;
    gzip_buffers        16 8k;
    gzip_http_version   1.1;
    gzip_min_length     256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/x-javascript
        application/atom+xml
        image/svg+xml
        font/ttf
        font/otf
        font/woff
        font/woff2;

    # ---------------------------------------------------------------------------
    # Rate limiting zones
    # ---------------------------------------------------------------------------
    # Global rate limit – 30 req/s per IP
    limit_req_zone $binary_remote_addr zone=global:10m rate=30r/s;

    # API rate limit – 10 req/s per IP (stricter)
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    # Auth endpoints – 5 req/min (very strict to prevent brute force)
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    # Return 429 when rate-limited (instead of default 503)
    limit_req_status 429;

    # ---------------------------------------------------------------------------
    # Upstream connection pools
    # ---------------------------------------------------------------------------
    upstream flask_api {
        least_conn;
        server flask:5000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream nextjs_frontend {
        least_conn;
        server frontend:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ---------------------------------------------------------------------------
    # SSL / TLS global settings
    # ---------------------------------------------------------------------------
    ssl_protocols               TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers   on;
    ssl_ciphers                 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256';
    ssl_session_cache           shared:SSL:50m;
    ssl_session_timeout         1d;
    ssl_session_tickets         off;
    ssl_stapling                on;
    ssl_stapling_verify         on;
    resolver                    1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout            5s;

    # ---------------------------------------------------------------------------
    # Include virtual host configurations
    # ---------------------------------------------------------------------------
    include /etc/nginx/conf.d/*.conf;
}
