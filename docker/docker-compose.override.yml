# =============================================================================
# PuraEstate – Docker Compose Override (Development)
# =============================================================================
# This file is auto-merged with docker-compose.yml by Docker Compose when
# present. It overrides settings for local development.
#
# Usage:
#   docker compose up           # uses docker-compose.yml + this file (dev)
#   docker compose -f docker-compose.yml up  # production only (no override)
#
# IMPORTANT: Do NOT use this file in production deployments.
#            Rename or remove it on the production VPS.
# =============================================================================

services:

  postgres:
    ports:
      # Expose PostgreSQL to the host for local DB tools (TablePlus, DBeaver)
      - "5432:5432"

  redis:
    ports:
      # Expose Redis to the host for local inspection (RedisInsight)
      - "6379:6379"

  flask:
    build:
      context: ../backend
      dockerfile: ../deploy/Dockerfile.backend
    environment:
      FLASK_ENV: development
      LOG_LEVEL: DEBUG
      WORKERS: 1
      WORKER_CLASS: sync
    volumes:
      # Hot-reload: mount source code directly (development only)
      - ../backend:/app
    ports:
      # Expose Flask directly for development API calls
      - "5000:5000"
    command: >
      flask run --host=0.0.0.0 --port=5000 --debug --reload

  frontend:
    build:
      context: ../frontend
      dockerfile: ../deploy/Dockerfile.frontend
    environment:
      NODE_ENV: development
    volumes:
      # Hot-reload: mount source code directly
      - ../frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      # Expose Next.js dev server
      - "3000:3000"
    command: npm run dev

  celery:
    environment:
      FLASK_ENV: development
      CELERY_LOGLEVEL: debug
      CELERY_CONCURRENCY: 1
    volumes:
      - ../backend:/app

  nginx:
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro

  flower:
    profiles: []   # Always start flower in development (no profile needed)
    ports:
      - "5555:5555"  # Expose directly in dev
