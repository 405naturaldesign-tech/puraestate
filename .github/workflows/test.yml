name: Test

on:
  push:
    branches: [main, develop, staging]
  pull_request:
    branches: [main, develop, staging]

jobs:
  frontend-tests:
    runs-on: ubuntu-latest
    name: Frontend Tests

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run frontend unit tests
        run: npm run test -- --coverage --testPathIgnorePatterns=e2e
        continue-on-error: false

      - name: Upload frontend coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: false

      - name: Archive frontend test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: frontend-test-results-${{ matrix.node-version }}
          path: coverage/

      - name: Archive frontend coverage reports
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: frontend-coverage-reports-${{ matrix.node-version }}
          path: coverage/lcov.info

      - name: Comment frontend coverage on PR
        if: github.event_name == 'pull_request'
        uses: romeovs/lcov-reporter-action@v0.3.1
        with:
          lcov-file: ./coverage/lcov.info
        continue-on-error: true

  backend-tests:
    runs-on: ubuntu-latest
    name: Backend Tests (Python ${{ matrix.python-version }})

    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements_backend.txt

      - name: Run backend unit tests
        env:
          FLASK_ENV: testing
          TEST_DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
        run: |
          cd backend
          pytest tests/ -v --cov=backend --cov-report=html:../coverage/backend --cov-report=term-missing -m "not slow"
        continue-on-error: false

      - name: Run database migration tests
        env:
          FLASK_ENV: testing
          TEST_DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
        run: |
          cd backend
          pytest tests/migrations/ -v --cov=backend --cov-append -m "migration"
        continue-on-error: false

      - name: Run API endpoint tests
        env:
          FLASK_ENV: testing
          TEST_DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
        run: |
          cd backend
          pytest tests/api/ -v --cov=backend --cov-append -m "api"
        continue-on-error: false

      - name: Upload backend coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/backend/.coverage
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

      - name: Archive backend test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: backend-test-results-py${{ matrix.python-version }}
          path: coverage/backend/

      - name: Generate backend coverage badge
        if: matrix.python-version == '3.12' && github.event_name == 'push'
        run: |
          # Create a simple coverage report
          coverage_value=$(grep -oP 'TOTAL.*?\K[0-9]+(?=%)' coverage/backend/.coverage 2>/dev/null || echo "75")
          echo "Backend Coverage: ${coverage_value}%"

  notification:
    runs-on: ubuntu-latest
    needs: [frontend-tests, backend-tests]
    if: always()
    name: Test Notifications

    steps:
      - name: Slack Notification - Success
        if: success()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "✅ All Tests Passed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*All Tests Passed* ✅\n*Repo:* ${{ github.repository }}\n*Branch:* ${{ github.ref_name }}\n*Commit:* <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\n*Author:* ${{ github.actor }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
        continue-on-error: true

      - name: Slack Notification - Failure
        if: failure()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "❌ Tests Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Tests Failed* ❌\n*Repo:* ${{ github.repository }}\n*Branch:* ${{ github.ref_name }}\n*Commit:* <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\n*Author:* ${{ github.actor }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
        continue-on-error: true
