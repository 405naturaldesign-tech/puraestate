name: Deploy to Google Play

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Configure Git
        run: |
          git config --local user.email "ci@puraestate.com"
          git config --local user.name "CI/CD Pipeline"

      - name: Get version from tag or package.json
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"

      - name: Build Android Release
        run: eas build --platform android --profile production --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Setup Android keystore
        run: |
          mkdir -p ~/.android
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > ~/.android/keystore.jks
          echo "keystore.properties" > ~/.android/.gitignore

      - name: Create keystore properties
        run: |
          cat > ~/.android/keystore.properties << EOF
          KEYSTORE_FILE=$HOME/.android/keystore.jks
          KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS=${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Submit to Google Play (Internal Testing)
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.puraestate
          releaseFiles: 'app-release.aab'
          track: internal
          inAppUpdatePriority: 5
          status: completed
          mappingFile: 'app/build/outputs/mapping/release/mapping.txt'

      - name: Submit to Google Play (Staged Rollout - 10%)
        if: github.ref == 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/')
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.puraestate
          releaseFiles: 'app-release.aab'
          track: production
          userFraction: 0.1
          inAppUpdatePriority: 5
          status: inProgress
          mappingFile: 'app/build/outputs/mapping/release/mapping.txt'

      - name: Submit to Google Play (Full Release)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.puraestate
          releaseFiles: 'app-release.aab'
          track: production
          inAppUpdatePriority: 5
          status: completed
          mappingFile: 'app/build/outputs/mapping/release/mapping.txt'

      - name: Generate Changelog
        id: changelog
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          git log --oneline --no-decorate $(git describe --tags --abbrev=0 2>/dev/null || echo "HEAD~10")..${{ github.sha }} > changelog.txt || echo "Initial release" > changelog.txt
          cat changelog.txt

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: ncipollo/release-action@v1.12.0
        with:
          tag: ${{ github.ref_name }}
          bodyFile: changelog.txt
          draft: false
          prerelease: false
          generateReleaseNotes: true

      - name: Slack Notification - Deployment Started
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "🚀 Deployment Started",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Deployment Started* 🚀\n*Repo:* ${{ github.repository }}\n*Version:* ${{ steps.version.outputs.version }}\n*Target:* Google Play Store\n*Branch:* ${{ github.ref_name }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Slack Notification - Deployment Success
        if: success()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "✅ Deployment Completed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Deployment Completed* ✅\n*Repo:* ${{ github.repository }}\n*Version:* ${{ steps.version.outputs.version }}\n*Target:* Google Play Store\n*Status:* Live or Staged Rollout\n*Release Type:* ${{ startsWith(github.ref, 'refs/tags/v') && 'Full Release' || 'Staged Rollout (10%)' }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Slack Notification - Deployment Failure
        if: failure()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "❌ Deployment Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Deployment Failed* ❌\n*Repo:* ${{ github.repository }}\n*Version:* ${{ steps.version.outputs.version }}\n*Target:* Google Play Store\n*Action:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View details>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  rollback:
    runs-on: ubuntu-latest
    if: failure() && github.ref == 'refs/heads/main'
    needs: deploy

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Rollback deployment
        run: |
          echo "Initiating rollback..."
          # Query Google Play API to revert to previous version
          # This would be implemented with API calls to Google Play

      - name: Slack Notification - Rollback
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "⚠️ Automatic Rollback Initiated",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Automatic Rollback* ⚠️\n*Repo:* ${{ github.repository }}\n*Reason:* Deployment failure detected\n*Action:* Rolling back to previous version\n*Status:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Check status>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
