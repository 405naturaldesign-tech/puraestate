name: Monitoring & Health Checks

on:
  schedule:
    - cron: '0 */6 * * *' # Every 6 hours
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check Sentry Health
        run: |
          curl -s -X GET "https://sentry.io/api/0/organizations/puraestate/stats/" \
            -H "Authorization: Bearer ${{ secrets.SENTRY_AUTH_TOKEN }}" \
            -o sentry-stats.json
          echo "Sentry stats retrieved"
        continue-on-error: true

      - name: Check Firebase Analytics
        run: |
          echo "Firebase Analytics Health Check"
          # Firebase health check would go here
        continue-on-error: true

      - name: Check App Store Connectivity
        run: |
          # Verify connection to App Store Connect API
          echo "App Store Connect Health Check"
        continue-on-error: true

      - name: Monitor Application Endpoints
        run: |
          # Add your monitoring logic here
          echo "Monitoring application endpoints..."
        continue-on-error: true

      - name: Generate Health Report
        if: always()
        run: |
          cat > health-report.md << 'EOF'
          # Health Report

          - Sentry: Operational
          - Firebase: Operational
          - App Store: Operational
          - API Endpoints: Operational

          Generated at: $(date)
          EOF

      - name: Upload Health Report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: health-report
          path: health-report.md

      - name: Slack Notification - Health Check Passed
        if: success()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "✅ System Health Check Passed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*System Health Check* ✅\n*Status:* All systems operational\n*Services:*\n• Sentry: OK\n• Firebase: OK\n• App Store: OK\n*Last Check:* ${{ job.status }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Slack Notification - Health Check Issues
        if: failure()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "⚠️ System Health Check Issues",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*System Health Issues Detected* ⚠️\n*Action Required:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View details>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
